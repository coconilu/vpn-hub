name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.EXPECTED_SHA }}
          persist-credentials: false

      - name: Assert exact reviewed source
        shell: pwsh
        run: |
          $actual = git rev-parse HEAD
          if ($actual -ne $env:EXPECTED_SHA) { throw "review source mismatch: expected $env:EXPECTED_SHA, got $actual" }

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version

      - name: Reject specific local client product names
        run: npm run check:generic-client-names

      - name: Check Markdown relative links
        run: npm run check:markdown-links

  frontend:
    name: Frontend checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.EXPECTED_SHA }}
          persist-credentials: false

      - name: Assert exact reviewed source
        shell: pwsh
        run: |
          $actual = git rev-parse HEAD
          if ($actual -ne $env:EXPECTED_SHA) { throw "review source mismatch: expected $env:EXPECTED_SHA, got $actual" }

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend request ordering
        run: npm test

      - name: Build frontend
        run: npm run build

  guardian:
    name: Guardian checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.EXPECTED_SHA }}
          persist-credentials: false

      - name: Assert exact reviewed source
        shell: pwsh
        run: |
          $actual = git rev-parse HEAD
          if ($actual -ne $env:EXPECTED_SHA) { throw "review source mismatch: expected $env:EXPECTED_SHA, got $actual" }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
